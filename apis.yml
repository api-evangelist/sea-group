aid: sea-group
name: Sea Group (Sea Limited)
description: |
  Sea Limited is a Singapore-headquartered consumer internet holding
  company that operates three core businesses across Southeast Asia,
  Taiwan, and Latin America: Shopee (e-commerce), Garena (digital
  entertainment and game publishing), and SeaMoney / Monee (digital
  financial services including SeaBank, ShopeePay, and SPayLater).
  Sea Limited is publicly listed on the NYSE (ticker: SE). Sea does
  not publish a unified group-level developer API — each operating
  subsidiary maintains its own developer platform: Shopee Open
  Platform (open.shopee.com) for marketplace integrations, Garena
  for game-platform partners, and SeaMoney / ShopeePay for in-region
  payment integrations.
