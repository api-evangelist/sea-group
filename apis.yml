  - type: Features
    data:
      - name: Multi-Brand Operating Holding
        description: Sea Limited operates three independent consumer internet businesses (Shopee, Garena, SeaMoney) under one holding company.
      - name: Southeast Asia Footprint
        description: Operates across Singapore, Indonesia, Malaysia, Philippines, Thailand, Vietnam, Taiwan, and select markets in Latin America (Brazil) and Europe.
      - name: Integrated Ecosystem
        description: Cross-platform integration where ShopeePay powers payments in Shopee and Garena, and SPayLater extends consumer credit across the ecosystem.
      - name: Public Company
        description: Listed on the New York Stock Exchange under ticker SE since 2017.
  - type: UseCases
    data:
      - name: Marketplace Integration
        description: Sellers and ERP/SaaS vendors integrate with Shopee Open Platform to manage products, orders, logistics, and finance across SEA marketplaces.
      - name: Game Publishing
        description: Garena publishes and operates third-party game titles in SEA including Free Fire, Arena of Valor, and Call of Duty Mobile.
      - name: Digital Wallet & Banking
        description: SeaMoney delivers ShopeePay digital wallet, SPayLater consumer credit, and SeaBank deposit and lending products in select SEA markets.
  - type: Authentication
    data:
      - name: No Group-Level API
        description: Sea Limited does not publish a holding-company developer portal or unified API. Developers integrate with the relevant subsidiary platform (Shopee Open Platform, Garena partner programs, ShopeePay merchant APIs).
  - type: Compliance
    data:
      - name: SEC Reporting
        description: Sea Limited files 20-F annual reports and 6-K interim disclosures with the US Securities and Exchange Commission as a foreign private issuer.
      - name: MAS Regulation
        description: SeaMoney entities are regulated by the Monetary Authority of Singapore and equivalent regulators in each operating market (OJK in Indonesia, BSP in the Philippines, etc.).
  - type: Subsidiaries
    data:
      - name: Shopee
        description: Pan-SEA e-commerce marketplace and Sea Group's largest revenue contributor.
      - name: Garena
        description: Digital entertainment arm that develops and publishes online games across SEA, Taiwan, and Latin America.
      - name: SeaMoney (Monee)
        description: Digital financial services arm covering payments (ShopeePay), consumer credit (SPayLater), and digital banking (SeaBank).
